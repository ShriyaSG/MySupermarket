# my_supermarket.ini
# Initial configuration loaded automatically at startup.
# Lines starting with '#' are comments.

# Bootstrap as manager
login ceo 123456789

# Load default catalogue (fruit-and-vegetables, dairy, meat + test cards + default users)
setup

# Category-level pricing policies (R6)
setCategoryDiscount fruit-and-vegetables 10
setCategoryDiscount dairy 5

# Additional items
addItem orange      fruit-and-vegetables   0.50 0.20  80
addItem carrot      fruit-and-vegetables   0.40 0.20 120
addItem butter      dairy                  2.20 0.25  25
addItem lamb        meat                  15.00 0.60   8

# Register staff
registerCashier  Bob   Dupont   bob       bobpwd
registerCashier  Carol Martin   carol     carolpwd

# Register customers
registerCustomer Alice  Durand   alice     "12 rue de la Paix, Paris"   alicepwd
registerCustomer Pierre Moreau   pierre    "5 avenue Foch, Lyon"        pierrepwd

logout
